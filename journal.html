<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蜕言记 · 日记本</title>
    <style>
        :root {
            --bg: #0c0f0d;
            --surface: #1a1e19;
            --gold: #b8a07a;
            --gold-dim: #8a7558;
            --gold-pale: #d4c5a9;
            --text: #d3cfc6;
            --text-dim: #8c887e;
            --border: #2a332b;
            --page-bg: #f4efe2;
            --page-text: #2e2b26;
            --transition: 0.5s ease;
            --font-serif: "Noto Serif SC", "STSong", "Songti SC", "KaiTi", serif;
            --font-hand: "KaiTi", "STKaiti", "楷体", serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: var(--font-serif);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(ellipse at 50% 30%, rgba(184,160,122,0.06) 0%, transparent 60%);
        }

        h1 {
            color: var(--gold-pale);
            font-weight: 400;
            letter-spacing: 0.2em;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        /* 书本容器 */
        .book {
            position: relative;
            width: 90vw;
            max-width: 600px;
            height: 70vh;
            max-height: 800px;
            perspective: 2000px;
            perspective-origin: left center;
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            transform-origin: left center;
            transition: transform 0.7s cubic-bezier(0.25, 0.1, 0.25, 1);
            transform-style: preserve-3d;
            border-radius: 0 8px 8px 0;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.5);
            background: var(--page-bg);
            color: var(--page-text);
            padding: 40px 30px;
            font-family: var(--font-hand);
            font-size: 1rem;
            line-height: 1.8;
            overflow-y: auto;
            cursor: default;
            user-select: text;
        }

        .page.front {
            z-index: 2;
        }

        .page.back {
            z-index: 1;
            transform: rotateY(180deg);
        }

        .page.flipped {
            transform: rotateY(-180deg);
            z-index: 1;
        }

        .page-content {
            outline: none;
            min-height: 100%;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .page-content[contenteditable="true"]:focus {
            outline: 1px dashed var(--gold-dim);
            padding: 4px;
        }

        .page-number {
            position: absolute;
            bottom: 20px;
            right: 30px;
            font-size: 0.75rem;
            color: var(--text-dim);
            font-family: var(--font-serif);
        }

        /* 翻页按钮 */
        .controls {
            margin-top: 24px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--gold-dim);
            color: var(--gold-pale);
            padding: 10px 24px;
            font-family: var(--font-serif);
            letter-spacing: 0.1em;
            cursor: pointer;
            transition: 0.2s;
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .btn:hover {
            background: var(--gold-dim);
            color: #0c0f0d;
        }

        .btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        .page-indicator {
            color: var(--text-dim);
            font-size: 0.8rem;
            min-width: 60px;
            text-align: center;
        }

        /* 点击区域提示 */
        .click-hint {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 60%;
            z-index: 10;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(0,0,0,0.1);
            font-size: 2rem;
        }
        .click-hint.left { left: 0; }
        .click-hint.right { right: 0; }
        .book:hover .click-hint { opacity: 1; }

        @media (max-width: 600px) {
            .page { padding: 24px 16px; }
        }

        /* 返回主页链接 */
        .back-link {
            position: fixed;
            top: 20px;
            left: 20px;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            z-index: 50;
        }
        .back-link:hover { color: var(--gold-pale); }
    </style>
</head>
<body>
    <a href="https://lamentode.github.io/tearscribe/" class="back-link">← 返回主页</a>
    <h1>蜕言记</h1>

    <div class="book" id="book">
        <!-- 页面通过JS动态生成，便于管理 -->
    </div>

    <div class="controls">
        <button class="btn" id="prevBtn">◀ 上一页</button>
        <span class="page-indicator" id="pageIndicator">1 / 6</span>
        <button class="btn" id="nextBtn">下一页 ▶</button>
    </div>

    <script>
        (function() {
            // 日记本数据：每页默认内容（可编辑）
            const pagesData = [
                { content: "蜕言记\n\n泪纪蛇闻 · 私密日记", number: "封面" },
                { content: "今日之事，如鳞片剥落。\n\n我写下这些字时，仿佛听见蛇蜕摩擦枯叶的声音。", number: "1" },
                { content: "我们总在遗忘，而记录是一种温柔的挽留。\n\n愿你读到这些时，仍能触到此刻的温度。", number: "2" },
                { content: "梦是另一层蜕皮。\n昨夜梦见自己变成透明的蛇，游过所有未寄出的信。", number: "3" },
                { content: "情绪像未拆封的旧书。\n今天想为你写一页关于雨声的便签。", number: "4" },
                { content: "最后的空白留给明天。\n蛇会继续蜕皮，我也会继续写下去。", number: "5" }
            ];

            const bookContainer = document.getElementById('book');
            let currentPage = 0; // 0-based, 显示第0页（封面）
            const totalPages = pagesData.length;

            // 创建页面DOM
            function createPages() {
                bookContainer.innerHTML = '';
                pagesData.forEach((page, index) => {
                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'page';
                    pageDiv.setAttribute('data-index', index);
                    pageDiv.innerHTML = `
                        <div class="page-content" contenteditable="true">${page.content}</div>
                        <span class="page-number">${page.number}</span>
                    `;
                    bookContainer.appendChild(pageDiv);
                });
            }

            // 更新页面显示状态（仅显示当前页，其他隐藏，通过旋转实现翻页）
            function showPage(index) {
                const pages = document.querySelectorAll('.page');
                pages.forEach((page, i) => {
                    if (i === index) {
                        page.classList.add('front');
                        page.classList.remove('back', 'flipped');
                        page.style.zIndex = 2;
                        page.style.transform = 'rotateY(0deg)';
                    } else if (i < index) {
                        // 已经翻过去的页，保持在左侧并翻转180度
                        page.classList.remove('front');
                        page.classList.add('flipped');
                        page.style.zIndex = 1;
                        page.style.transform = 'rotateY(-180deg)';
                    } else {
                        // 还未翻到的页，堆叠在右侧不可见
                        page.classList.remove('front', 'flipped');
                        page.classList.add('back');
                        page.style.zIndex = 1;
                        page.style.transform = 'rotateY(180deg)';
                    }
                });

                document.getElementById('pageIndicator').textContent = `${index + 1} / ${totalPages}`;
                document.getElementById('prevBtn').disabled = (index === 0);
                document.getElementById('nextBtn').disabled = (index === totalPages - 1);
            }

            // 翻页函数
            function nextPage() {
                if (currentPage < totalPages - 1) {
                    // 将当前页翻过去
                    const currentPageElement = document.querySelector(`.page[data-index='${currentPage}']`);
                    if (currentPageElement) {
                        currentPageElement.classList.add('flipped');
                        currentPageElement.style.transform = 'rotateY(-180deg)';
                        currentPageElement.style.zIndex = 1;
                    }
                    currentPage++;
                    // 显示新页面
                    const newPageElement = document.querySelector(`.page[data-index='${currentPage}']`);
                    if (newPageElement) {
                        newPageElement.classList.remove('back');
                        newPageElement.classList.add('front');
                        newPageElement.style.transform = 'rotateY(0deg)';
                        newPageElement.style.zIndex = 2;
                    }
                    updateButtons();
                }
            }

            function prevPage() {
                if (currentPage > 0) {
                    // 将当前页放回右侧
                    const currentPageElement = document.querySelector(`.page[data-index='${currentPage}']`);
                    if (currentPageElement) {
                        currentPageElement.classList.remove('front');
                        currentPageElement.classList.add('back');
                        currentPageElement.style.transform = 'rotateY(180deg)';
                        currentPageElement.style.zIndex = 1;
                    }
                    currentPage--;
                    // 恢复上一页为正面
                    const prevPageElement = document.querySelector(`.page[data-index='${currentPage}']`);
                    if (prevPageElement) {
                        prevPageElement.classList.remove('flipped');
                        prevPageElement.classList.add('front');
                        prevPageElement.style.transform = 'rotateY(0deg)';
                        prevPageElement.style.zIndex = 2;
                    }
                    updateButtons();
                }
            }

            function updateButtons() {
                document.getElementById('pageIndicator').textContent = `${currentPage + 1} / ${totalPages}`;
                document.getElementById('prevBtn').disabled = (currentPage === 0);
                document.getElementById('nextBtn').disabled = (currentPage === totalPages - 1);
            }

            // 点击左右区域翻页
            bookContainer.addEventListener('click', function(e) {
                const rect = bookContainer.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const width = rect.width;
                if (x < width * 0.3) {
                    prevPage();
                } else if (x > width * 0.7) {
                    nextPage();
                }
            });

            // 按钮绑定
            document.getElementById('prevBtn').addEventListener('click', prevPage);
            document.getElementById('nextBtn').addEventListener('click', nextPage);

            // 键盘翻页
            document.addEventListener('keydown', function(e) {
                if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    prevPage();
                } else if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    nextPage();
                }
            });

            // 初始化
            createPages();
            showPage(0);
        })();
    </script>
</body>
</html>
