<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>蜕言记 · 泪纪蛇闻</title>
  <style>
    :root {
      --bg: #1e1b18;
      --leather-dark: #3a2f28;
      --leather-mid: #5a4a3a;
      --leather-light: #7a6a5a;
      --page-bg: #faf3e8;
      --page-text: #2e2b26;
      --ink: #2c2416;
      --gold: #b8a07a;
      --gold-dim: #8a7558;
      --gold-pale: #d4c5a9;
      --shadow: 0 20px 60px rgba(0,0,0,0.7);
      --transition: 0.5s cubic-bezier(0.25, 0.1, 0.15, 1.0);
      --font-serif: "Noto Serif SC", "STSong", "Songti SC", "KaiTi", serif;
      --font-hand: "KaiTi", "STKaiti", "楷体", "华文楷体", serif;
    }
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: var(--bg);
      background-image: radial-gradient(ellipse at 50% 30%, rgba(184,160,122,0.1) 0%, transparent 70%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: var(--font-serif);
      padding: 20px;
      margin: 0;
      user-select: none;
    }

    /* 主标题 */
    h1 {
      color: var(--gold-pale);
      font-weight: 400;
      letter-spacing: 0.2em;
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      margin-bottom: 1.5rem;
      text-shadow: 0 0 20px rgba(184,160,122,0.2);
    }

    /* 日记本整体容器 - 模仿皮革封面 */
    .journal-wrapper {
      position: relative;
      width: 90vw;
      max-width: 700px;
      height: 75vh;
      max-height: 850px;
      perspective: 1800px;
      perspective-origin: center center;
    }

    /* 书脊与封面结构 */
    .journal-book {
      position: relative;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.6s ease;
      box-shadow: var(--shadow);
      border-radius: 8px 12px 12px 8px;
    }

    /* 皮革封面纹理 (使用渐变与噪点模拟) */
    .journal-book::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 20%, rgba(120,100,80,0.4) 0%, transparent 50%),
                  linear-gradient(135deg, var(--leather-dark) 0%, var(--leather-mid) 30%, var(--leather-light) 60%, var(--leather-mid) 100%);
      background-blend-mode: overlay;
      border-radius: inherit;
      z-index: 0;
      pointer-events: none;
      box-shadow: inset 0 0 60px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,240,0.15);
    }

    /* 封面装饰线 */
    .journal-book::after {
      content: '';
      position: absolute;
      top: 15px;
      left: 15px;
      right: 15px;
      bottom: 15px;
      border: 2px solid rgba(200,180,140,0.3);
      border-radius: 6px;
      pointer-events: none;
      z-index: 0;
    }

    /* 书脊装饰 */
    .spine {
      position: absolute;
      left: -8px;
      top: 0;
      bottom: 0;
      width: 16px;
      background: linear-gradient(90deg, #2a2218, #5a4a3a, #3a2f28);
      border-radius: 8px 0 0 8px;
      z-index: 5;
      box-shadow: -2px 0 10px rgba(0,0,0,0.6);
    }

    /* 页面容器 */
    .pages-container {
      position: absolute;
      top: 8px;
      left: 12px;
      right: 12px;
      bottom: 8px;
      transform-style: preserve-3d;
      z-index: 2;
    }

    /* 单页样式 */
    .page {
      position: absolute;
      width: 100%;
      height: 100%;
      background: var(--page-bg);
      background-image: url('https://raw.githubusercontent.com/Lamentode/tearscribe/main/IMG_20260525_031218.jpg');
      background-size: cover;
      background-position: center;
      transform-origin: left center;
      transition: transform 0.55s cubic-bezier(0.2, 0.1, 0.1, 1.0);
      transform-style: preserve-3d;
      box-shadow: 0 2px 20px rgba(0,0,0,0.2);
      border-radius: 0 6px 6px 0;
      cursor: pointer;
      color: var(--ink);
      font-family: var(--font-hand);
      padding: 2rem;
      line-height: 1.8;
      font-size: clamp(0.9rem, 1.8vw, 1.1rem);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    /* 纸张纹理叠加 */
    .page::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(250, 243, 232, 0.3);
      background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(180,150,100,0.1) 2px, rgba(180,150,100,0.1) 2.5px);
      pointer-events: none;
      border-radius: inherit;
    }

    /* 内页图片背景 (使用用户提供的透明底图) */
    .page.first-page {
      background-image: url('https://raw.githubusercontent.com/Lamentode/tearscribe/main/%E6%97%A0%E6%A0%87%E9%A2%98268_20260525035235.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      background-color: var(--page-bg);
    }

    .page.front {
      z-index: 2;
    }
    .page.back {
      z-index: 1;
      transform: rotateY(180deg);
    }
    .page.flipped {
      transform: rotateY(-175deg);
      z-index: 1;
    }
    .page.hidden-left {
      transform: rotateY(-175deg);
      z-index: 0;
    }

    /* 页码 */
    .page-number {
      margin-top: auto;
      text-align: right;
      font-size: 0.7rem;
      color: #8c8060;
      font-family: var(--font-serif);
    }

    /* 可编辑内容 */
    .page-content {
      outline: none;
      flex: 1;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .page-content:focus {
      background: rgba(0,0,0,0.02);
      border-radius: 4px;
      padding: 4px;
    }

    /* 控制按钮 */
    .controls {
      margin-top: 1.5rem;
      display: flex;
      gap: 1.5rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    .btn {
      background: rgba(184,160,122,0.15);
      border: 1px solid var(--gold-dim);
      color: var(--gold-pale);
      padding: 0.7rem 1.8rem;
      font-family: var(--font-serif);
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: all 0.2s;
      border-radius: 30px;
      font-size: 0.9rem;
      backdrop-filter: blur(4px);
    }
    .btn:hover {
      background: var(--gold-dim);
      color: #1e1b18;
      border-color: var(--gold);
    }
    .btn:active {
      transform: scale(0.96);
    }
    .page-indicator {
      color: var(--text-dim);
      font-size: 0.9rem;
      min-width: 70px;
      text-align: center;
      font-family: var(--font-serif);
      letter-spacing: 0.08em;
    }
    .text-dim { color: #8c887e; }

    /* 返回主页 */
    .back-link {
      position: fixed;
      top: 20px;
      left: 20px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      z-index: 50;
      background: rgba(0,0,0,0.4);
      padding: 0.4rem 1rem;
      border-radius: 20px;
      backdrop-filter: blur(8px);
    }
    .back-link:hover { color: var(--gold-pale); }

    @media (max-width: 600px) {
      .journal-wrapper {
        height: 65vh;
      }
      .page {
        padding: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <a href="https://lamentode.github.io/tearscribe/" class="back-link">← 返回主页</a>
  <h1>蜕言记</h1>

  <div class="journal-wrapper" id="journalWrapper">
    <div class="journal-book" id="journalBook">
      <div class="spine"></div>
      <div class="pages-container" id="pagesContainer">
        <!-- JS动态填充页面 -->
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="prevBtn">◀ 前一页</button>
    <span class="page-indicator" id="pageIndicator">1 / 6</span>
    <button class="btn" id="nextBtn">后一页 ▶</button>
  </div>

  <script>
    (function() {
      // 页面数据 (可编辑)
      const pagesData = [
        { content: "蜕言记\n\n泪纪蛇闻 · 私密手札", number: "封面", isFirst: true },
        { content: "今日拾得一片鳞。\n\n在旧书摊遇见一本无人问津的诗集，扉页写着「给未来的自己」。我买下它，当作今天的日记。", number: "1" },
        { content: "雨下了整整一天。\n\n适合写信，适合回忆。想起你说过，雨声是世界上最温柔的蜕皮声。", number: "2" },
        { content: "梦见了蛇。\n\n透明的蛇，穿过所有未寄出的信，在每个句号处停留，仿佛在辨认谁的字迹。", number: "3" },
        { content: "情绪盒子今日收藏：\n\n一片银杏叶、半张电影票、还有从旧日记本上撕下的「勇敢」二字。", number: "4" },
        { content: "最后一页留给明天。\n\n蛇会继续蜕皮，我会继续书写。晚安，倦鳞。", number: "5" }
      ];

      const container = document.getElementById('pagesContainer');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const indicator = document.getElementById('pageIndicator');
      let currentPage = 0;
      const totalPages = pagesData.length;

      // 创建页面DOM
      function renderPages() {
        container.innerHTML = '';
        pagesData.forEach((data, idx) => {
          const pageDiv = document.createElement('div');
          pageDiv.className = 'page';
          if (data.isFirst) pageDiv.classList.add('first-page');
          pageDiv.setAttribute('data-index', idx);
          pageDiv.innerHTML = `
            <div class="page-content" contenteditable="true">${data.content}</div>
            <div class="page-number">${data.number}</div>
          `;
          container.appendChild(pageDiv);
        });
      }

      // 更新页面显示
      function updatePages() {
        const pages = document.querySelectorAll('.page');
        pages.forEach((page, idx) => {
          page.classList.remove('front', 'back', 'flipped', 'hidden-left');
          if (idx === currentPage) {
            page.classList.add('front');
            page.style.zIndex = 2;
            page.style.transform = 'rotateY(0deg)';
          } else if (idx < currentPage) {
            page.classList.add('flipped');
            page.style.zIndex = 1;
            page.style.transform = 'rotateY(-175deg)';
          } else {
            page.classList.add('back');
            page.style.zIndex = 1;
            page.style.transform = 'rotateY(180deg)';
          }
        });
        indicator.textContent = `${currentPage + 1} / ${totalPages}`;
        prevBtn.disabled = (currentPage === 0);
        nextBtn.disabled = (currentPage === totalPages - 1);
      }

      function nextPage() {
        if (currentPage < totalPages - 1) {
          const currentEl = document.querySelector(`.page[data-index='${currentPage}']`);
          const nextEl = document.querySelector(`.page[data-index='${currentPage + 1}']`);
          if (currentEl) {
            currentEl.classList.add('flipped');
            currentEl.style.transform = 'rotateY(-175deg)';
            currentEl.style.zIndex = 1;
          }
          if (nextEl) {
            nextEl.classList.remove('back');
            nextEl.classList.add('front');
            nextEl.style.transform = 'rotateY(0deg)';
            nextEl.style.zIndex = 2;
          }
          currentPage++;
          updateButtons();
        }
      }

      function prevPage() {
        if (currentPage > 0) {
          const currentEl = document.querySelector(`.page[data-index='${currentPage}']`);
          const prevEl = document.querySelector(`.page[data-index='${currentPage - 1}']`);
          if (currentEl) {
            currentEl.classList.remove('front');
            currentEl.classList.add('back');
            currentEl.style.transform = 'rotateY(180deg)';
            currentEl.style.zIndex = 1;
          }
          if (prevEl) {
            prevEl.classList.remove('flipped');
            prevEl.classList.add('front');
            prevEl.style.transform = 'rotateY(0deg)';
            prevEl.style.zIndex = 2;
          }
          currentPage--;
          updateButtons();
        }
      }

      function updateButtons() {
        indicator.textContent = `${currentPage + 1} / ${totalPages}`;
        prevBtn.disabled = (currentPage === 0);
        nextBtn.disabled = (currentPage === totalPages - 1);
      }

      // 点击页面左右区域翻页
      container.addEventListener('click', (e) => {
        const rect = container.getBoundingClientRect();
        const x = e.clientX - rect.left;
        if (x < rect.width * 0.3) prevPage();
        else if (x > rect.width * 0.7) nextPage();
      });

      // 键盘翻页
      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') { e.preventDefault(); prevPage(); }
        else if (e.key === 'ArrowRight') { e.preventDefault(); nextPage(); }
      });

      prevBtn.addEventListener('click', prevPage);
      nextBtn.addEventListener('click', nextPage);

      // 初始化
      renderPages();
      updatePages();
    })();
  </script>
</body>
</html>
